openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AnimalView API - animal movement tracks and nearby street-level imagery
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: catalog
    description: Species / studies / individuals catalog
  - name: tracks
    description: Animal movement tracks
  - name: imagery
    description: Street-level imagery matching
  - name: simulation
    description: Synthetic plausible animal tracks (TaxonPath)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /species:
    get:
      operationId: listSpecies
      tags: [catalog]
      summary: List available species
      responses:
        "200":
          description: Species list
          content:
            application/json:
              schema:
                type: object
                required: [species]
                properties:
                  species:
                    type: array
                    items:
                      $ref: "#/components/schemas/Species"
  /studies:
    get:
      operationId: listStudies
      tags: [catalog]
      summary: List studies for a species
      parameters:
        - in: query
          name: species
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Studies list
          content:
            application/json:
              schema:
                type: object
                required: [studies]
                properties:
                  studies:
                    type: array
                    items:
                      $ref: "#/components/schemas/Study"
  /individuals:
    get:
      operationId: listIndividuals
      tags: [catalog]
      summary: List individuals within a study
      parameters:
        - in: query
          name: studyId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Individuals list
          content:
            application/json:
              schema:
                type: object
                required: [individuals]
                properties:
                  individuals:
                    type: array
                    items:
                      $ref: "#/components/schemas/Individual"
  /track:
    get:
      operationId: getTrack
      tags: [tracks]
      summary: Get an animal track as GeoJSON-friendly points
      parameters:
        - in: query
          name: studyId
          required: true
          schema:
            type: string
        - in: query
          name: individualId
          required: true
          schema:
            type: string
        - in: query
          name: from
          required: false
          schema:
            type: string
        - in: query
          name: to
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Track
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Track"
  /weather:
    get:
      operationId: getWeather
      tags: [weather]
      summary: Real historical weather at a location and time (Open-Meteo ERA5 archive)
      parameters:
        - in: query
          name: lat
          required: true
          schema:
            type: number
        - in: query
          name: lon
          required: true
          schema:
            type: number
        - in: query
          name: timestamp
          required: true
          description: ISO 8601 timestamp of the GPS fix
          schema:
            type: string
      responses:
        "200":
          description: Weather observation
          content:
            application/json:
              schema:
                type: object
                required: [time, weatherCode, label]
                properties:
                  time:
                    type: string
                    description: ISO hour the observation corresponds to
                  temperatureC:
                    type: number
                    nullable: true
                  windSpeedKmh:
                    type: number
                    nullable: true
                  precipitationMm:
                    type: number
                    nullable: true
                  weatherCode:
                    type: integer
                    description: WMO weather interpretation code
                  label:
                    type: string
                    description: Human-readable weather description
  /match-imagery:
    post:
      operationId: matchImagery
      tags: [imagery]
      summary: Match street-level imagery to track points
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchImageryRequest"
      responses:
        "200":
          description: Matches
          content:
            application/json:
              schema:
                type: object
                required: [matches, mode]
                properties:
                  mode:
                    type: string
                    description: "real"
                  matches:
                    type: array
                    items:
                      $ref: "#/components/schemas/ImageryMatch"
  /analyze-imagery:
    post:
      operationId: analyzeImagery
      tags: [imagery]
      summary: Interpret a context photo from the species' perspective (AI narrative)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeImageryRequest"
      responses:
        "200":
          description: Narrative analysis
          content:
            application/json:
              schema:
                type: object
                required: [narrative, species]
                properties:
                  narrative:
                    type: string
                  species:
                    type: string
  /providers:
    get:
      operationId: getProviders
      tags: [imagery]
      summary: Report which imagery providers are configured
      responses:
        "200":
          description: Providers
          content:
            application/json:
              schema:
                type: object
                required: [google, mapillary, movebank]
                properties:
                  google:
                    type: boolean
                  mapillary:
                    type: boolean
                  movebank:
                    type: boolean
  /sim-species:
    get:
      operationId: listSimSpecies
      tags: [simulation]
      summary: List built-in simulator species profiles
      responses:
        "200":
          description: Sim species list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimSpeciesList"
  /human-pressure:
    get:
      operationId: getHumanPressure
      tags: [simulation]
      summary: Fetch OSM-derived human pressure points (roads, urban) around a coordinate
      parameters:
        - in: query
          name: lat
          required: true
          schema: { type: number }
        - in: query
          name: lon
          required: true
          schema: { type: number }
        - in: query
          name: radius
          required: false
          schema: { type: number, default: 8000 }
      responses:
        "200":
          description: Pressure features
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HumanPressureResult"
  /human-presence:
    get:
      operationId: getHumanPresence
      tags: [simulation]
      summary: Fetch OSM-derived potential human-presence points (trails, lifts, huts, amenities, roads, settlements) with weights around a coordinate
      parameters:
        - in: query
          name: lat
          required: true
          schema: { type: number }
        - in: query
          name: lon
          required: true
          schema: { type: number }
        - in: query
          name: radius
          required: false
          schema: { type: number, default: 8000 }
      responses:
        "200":
          description: Human-presence features weighted by intensity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HumanPresenceResult"
  /simulate-track:
    post:
      operationId: simulateTrack
      tags: [simulation]
      summary: Generate a synthetic plausible animal track
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulateTrackInput"
      responses:
        "200":
          description: Simulated track
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulateTrackResult"
components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
    Species:
      type: object
      required: [id, commonName, scientificName]
      properties:
        id:
          type: string
        commonName:
          type: string
        scientificName:
          type: string
        habitat:
          type: string
    Study:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        principalInvestigator:
          type: string
        location:
          type: string
        citation:
          type: string
    Individual:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        sex:
          type: string
        nickname:
          type: string
    TrackPoint:
      type: object
      required: [lat, lon, timestamp]
      properties:
        lat:
          type: number
        lon:
          type: number
        timestamp:
          type: string
    Track:
      type: object
      required: [studyId, individualId, points, mode]
      properties:
        studyId:
          type: string
        individualId:
          type: string
        mode:
          type: string
          description: "real"
        points:
          type: array
          items:
            $ref: "#/components/schemas/TrackPoint"
    MatchImageryRequest:
      type: object
      required: [points, radius, providers]
      properties:
        radius:
          type: number
          description: Search radius in meters
        providers:
          type: array
          items:
            type: string
        points:
          type: array
          items:
            $ref: "#/components/schemas/TrackPoint"
    ImageryMatch:
      type: object
      required: [trackPointIndex, provider, distanceM, confidence]
      properties:
        trackPointIndex:
          type: integer
        provider:
          type: string
          description: "google | mapillary | wikimedia"
        distanceM:
          type: number
        panoId:
          type: string
        imageId:
          type: string
        imageLat:
          type: number
        imageLon:
          type: number
        imageDate:
          type: string
        heading:
          type: number
        confidence:
          type: string
          description: "high | medium | low"
        previewUrl:
          type: string
    AnalyzeImageryRequest:
      type: object
      required: [species, provider]
      properties:
        species:
          type: string
          description: Common name of the species (e.g. "Grey Wolf")
          minLength: 1
        scientificName:
          type: string
        habitat:
          type: string
        provider:
          type: string
          description: "google | mapillary | wikimedia"
        panoId:
          type: string
        heading:
          type: number
        imageUrl:
          type: string
          description: Preview image URL for non-google providers
        distanceM:
          type: number
    SimSpeciesProfile:
      type: object
      required: [id, commonName, scientificName, summary, stepMeters, maxDailyKm, explorationLevel, barrierSensitivity]
      properties:
        id:
          type: string
        commonName:
          type: string
        scientificName:
          type: string
        summary:
          type: string
        stepMeters:
          type: number
        maxDailyKm:
          type: number
        explorationLevel:
          type: number
        barrierSensitivity:
          type: number
    SimSpeciesList:
      type: object
      required: [species]
      properties:
        species:
          type: array
          items:
            $ref: "#/components/schemas/SimSpeciesProfile"
    SimulateTrackInput:
      type: object
      required: [speciesId, startLat, startLon, durationHours]
      properties:
        speciesId:
          type: string
          minLength: 1
        startLat:
          type: number
          minimum: -85
          maximum: 85
        startLon:
          type: number
          minimum: -180
          maximum: 180
        durationHours:
          type: number
          minimum: 1
          maximum: 720
          description: Simulated duration in hours (1 to 720)
        explorationOverride:
          type: number
          minimum: 0
          maximum: 1
        seed:
          type: number
    SimTrackPoint:
      type: object
      required: [lat, lon, timestamp, habitatScore, barrierRisk]
      properties:
        lat:
          type: number
        lon:
          type: number
        timestamp:
          type: string
        habitatScore:
          type: number
        barrierRisk:
          type: number
    SimBarrier:
      type: object
      required: [kind, lat, lon]
      properties:
        kind:
          type: string
          description: "highway | railway | water | urban"
        subtype:
          type: string
          description: "Raw OSM tag value, e.g. motorway, primary, rail, river, industrial"
        name:
          type: string
          description: "OSM name when present, e.g. A2, Drava"
        lat:
          type: number
        lon:
          type: number
    HumanPressureResult:
      type: object
      required: [center, radius, features]
      properties:
        center:
          type: object
          required: [lat, lon]
          properties:
            lat: { type: number }
            lon: { type: number }
        radius:
          type: number
        features:
          type: array
          items:
            $ref: "#/components/schemas/SimBarrier"
    PresenceFeature:
      type: object
      required: [category, weight, lat, lon]
      properties:
        category:
          type: string
          description: "trail | road | aerialway | tourism | amenity | building | settlement | leisure"
        weight:
          type: number
          description: "Relative potential human-presence intensity, 0..1"
        name:
          type: string
          description: "OSM name when present, e.g. Refuge des Évettes, Télésiège"
        lat:
          type: number
        lon:
          type: number
    HumanPresenceResult:
      type: object
      required: [center, radius, features]
      properties:
        center:
          type: object
          required: [lat, lon]
          properties:
            lat: { type: number }
            lon: { type: number }
        radius:
          type: number
        features:
          type: array
          items:
            $ref: "#/components/schemas/PresenceFeature"
    SimulateTrackResult:
      type: object
      required: [speciesId, individualId, points, barriers, warnings]
      properties:
        speciesId:
          type: string
        individualId:
          type: string
        points:
          type: array
          items:
            $ref: "#/components/schemas/SimTrackPoint"
        barriers:
          type: array
          items:
            $ref: "#/components/schemas/SimBarrier"
        warnings:
          type: array
          items:
            type: string
