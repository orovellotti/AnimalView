openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AnimalView API - animal movement tracks and nearby street-level imagery
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: catalog
    description: Species / studies / individuals catalog
  - name: tracks
    description: Animal movement tracks
  - name: imagery
    description: Street-level imagery matching
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /species:
    get:
      operationId: listSpecies
      tags: [catalog]
      summary: List curated demo species
      responses:
        "200":
          description: Species list
          content:
            application/json:
              schema:
                type: object
                required: [species]
                properties:
                  species:
                    type: array
                    items:
                      $ref: "#/components/schemas/Species"
  /studies:
    get:
      operationId: listStudies
      tags: [catalog]
      summary: List studies for a species
      parameters:
        - in: query
          name: species
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Studies list
          content:
            application/json:
              schema:
                type: object
                required: [studies]
                properties:
                  studies:
                    type: array
                    items:
                      $ref: "#/components/schemas/Study"
  /individuals:
    get:
      operationId: listIndividuals
      tags: [catalog]
      summary: List individuals within a study
      parameters:
        - in: query
          name: studyId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Individuals list
          content:
            application/json:
              schema:
                type: object
                required: [individuals]
                properties:
                  individuals:
                    type: array
                    items:
                      $ref: "#/components/schemas/Individual"
  /track:
    get:
      operationId: getTrack
      tags: [tracks]
      summary: Get an animal track as GeoJSON-friendly points
      parameters:
        - in: query
          name: studyId
          required: true
          schema:
            type: string
        - in: query
          name: individualId
          required: true
          schema:
            type: string
        - in: query
          name: from
          required: false
          schema:
            type: string
        - in: query
          name: to
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Track
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Track"
  /match-imagery:
    post:
      operationId: matchImagery
      tags: [imagery]
      summary: Match street-level imagery to track points
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchImageryRequest"
      responses:
        "200":
          description: Matches
          content:
            application/json:
              schema:
                type: object
                required: [matches, mode]
                properties:
                  mode:
                    type: string
                    description: "real | demo"
                  matches:
                    type: array
                    items:
                      $ref: "#/components/schemas/ImageryMatch"
  /providers:
    get:
      operationId: getProviders
      tags: [imagery]
      summary: Report which imagery providers are configured
      responses:
        "200":
          description: Providers
          content:
            application/json:
              schema:
                type: object
                required: [google, mapillary, movebank, demoMode]
                properties:
                  google:
                    type: boolean
                  mapillary:
                    type: boolean
                  movebank:
                    type: boolean
                  demoMode:
                    type: boolean
components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
    Species:
      type: object
      required: [id, commonName, scientificName]
      properties:
        id:
          type: string
        commonName:
          type: string
        scientificName:
          type: string
        habitat:
          type: string
    Study:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        principalInvestigator:
          type: string
        location:
          type: string
    Individual:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        sex:
          type: string
        nickname:
          type: string
    TrackPoint:
      type: object
      required: [lat, lon, timestamp]
      properties:
        lat:
          type: number
        lon:
          type: number
        timestamp:
          type: string
    Track:
      type: object
      required: [studyId, individualId, points, mode]
      properties:
        studyId:
          type: string
        individualId:
          type: string
        mode:
          type: string
          description: "real | demo"
        points:
          type: array
          items:
            $ref: "#/components/schemas/TrackPoint"
    MatchImageryRequest:
      type: object
      required: [points, radius, providers]
      properties:
        radius:
          type: number
          description: Search radius in meters
        providers:
          type: array
          items:
            type: string
        points:
          type: array
          items:
            $ref: "#/components/schemas/TrackPoint"
    ImageryMatch:
      type: object
      required: [trackPointIndex, provider, distanceM, confidence]
      properties:
        trackPointIndex:
          type: integer
        provider:
          type: string
          description: "google | mapillary | demo"
        distanceM:
          type: number
        panoId:
          type: string
        imageId:
          type: string
        imageLat:
          type: number
        imageLon:
          type: number
        imageDate:
          type: string
        heading:
          type: number
        confidence:
          type: string
          description: "high | medium | low"
        previewUrl:
          type: string
